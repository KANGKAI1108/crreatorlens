name = "creatorlens"
main = "index.js"
compatibility_date = "2024-01-01"

# 环境变量（部署时在 Cloudflare Dashboard 设置）
# GEMINI_API_KEY = 你的 Google AI Studio API Key

# KV 存储（URL 缓存）
[[kv_namespaces]]
binding = "CREATORLENS_CACHE"
id = ""

# 路由配置
routes = [
  { pattern = "webcreatorlens.kang61398.workers.dev", zone_name = "workers.dev" }
]